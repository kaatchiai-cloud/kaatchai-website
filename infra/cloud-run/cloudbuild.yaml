steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/stori-backend:$SHORT_SHA',
        '-f',
        'infra/cloud-run/Dockerfile',
        '.',
      ]
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/stori-backend:$SHORT_SHA']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run',
        'deploy',
        'stori-backend',
        '--image=gcr.io/$PROJECT_ID/stori-backend:$SHORT_SHA',
        '--region=us-central1',
        '--platform=managed',
        '--allow-unauthenticated',
        '--set-env-vars=SENTRY_DSN_CLOUDRUN=${_SENTRY_DSN_CLOUDRUN}',
        '--set-secrets=SUPABASE_JWT_SECRET=stori-jwt-secret:latest',
      ]
images:
  - 'gcr.io/$PROJECT_ID/stori-backend:$SHORT_SHA'
