name: stori_app
description: "AI-powered video creation app with dual-camera podcast recording"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Audio
  just_audio: ^0.9.42
  audio_session: ^0.1.21

  # Video & Camera
  camera: ^0.11.0+2
  video_player: ^2.9.2

  # Media Processing
  # ffmpeg_kit_flutter discontinued — will add ffmpeg_kit_flutter_new or native FFmpeg later

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.3
  path_provider: ^2.1.5

  # Network
  dio: ^5.7.0

  # File Handling
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0

  # Utils
  uuid: ^4.5.1
  collection: ^1.19.1
  path: ^1.9.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
